<!DOCTYPE html>
<html>
<head>
  <meta name="description" content="Free PDF tools with no limits. Merge PDF, JPG to PDF online. 100% private and fast.">
<meta name="keywords" content="merge pdf online free, jpg to pdf free, pdf tools no limit">
<meta name="robots" content="index, follow">
  <title>NoLimit PDF Tools</title>
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f7fb;
      text-align: center;
    }

    header {
      background: #4a6cf7;
      color: white;
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      padding: 30px;
    }

    .tool {
      background: white;
      padding: 20px;
      margin: 20px auto;
      max-width: 400px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    button {
      background: #4a6cf7;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #3a55d1;
    }

    p {
      color: #555;
    }
  </style>
</head>

<body>

<header>NoLimit PDF 🔒</header>

<div class="container">
  <p>Free PDF tools with no limits. Your files never leave your device.</p>

  <div class="tool">
    <h3>Merge PDF</h3>
    <input type="file" id="pdfFiles" multiple accept="application/pdf"><br><br>
    <button onclick="mergePDF()">Merge PDFs</button>
  </div>

  <div class="tool">
    <h3>JPG to PDF</h3>
    <input type="file" id="imageFiles" multiple accept="image/*"><br><br>
    <button onclick="jpgToPdf()">Convert to PDF</button>
  </div>

</div>

<script>
async function mergePDF() {
  const { PDFDocument } = PDFLib;
  const files = document.getElementById('pdfFiles').files;

  if(files.length < 2){
    alert("Select at least 2 PDFs");
    return;
  }

  const mergedPdf = await PDFDocument.create();

  for (let file of files) {
    const bytes = await file.arrayBuffer();
    const pdf = await PDFDocument.load(bytes);
    const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
    pages.forEach(p => mergedPdf.addPage(p));
  }

  const mergedBytes = await mergedPdf.save();

  const blob = new Blob([mergedBytes], { type: 'application/pdf' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'merged.pdf';
  link.click();
}

async function jpgToPdf() {
  const { PDFDocument } = PDFLib;
  const files = document.getElementById('imageFiles').files;

  if(files.length < 1){
    alert("Select images");
    return;
  }

  const pdfDoc = await PDFDocument.create();

  for (let file of files) {
    const bytes = await file.arrayBuffer();
    let image;

    if (file.type === "image/jpeg") {
      image = await pdfDoc.embedJpg(bytes);
    } else {
      image = await pdfDoc.embedPng(bytes);
    }

    const page = pdfDoc.addPage([image.width, image.height]);
    page.drawImage(image, {
      x: 0,
      y: 0,
      width: image.width,
      height: image.height
    });
  }

  const pdfBytes = await pdfDoc.save();

  const blob = new Blob([pdfBytes], { type: 'application/pdf' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'converted.pdf';
  link.click();
}
</script>

</body>
</html>
