<script>
 pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js"; 
async function mergePDF() {
  const { PDFDocument } = PDFLib;
  const files = document.getElementById('pdfFiles').files;

  if(files.length < 2){
    alert("Select at least 2 PDFs");
    return;
  }

  const mergedPdf = await PDFDocument.create();

  for (let file of files) {
    const bytes = await file.arrayBuffer();
    const pdf = await PDFDocument.load(bytes);
    const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
    pages.forEach(p => mergedPdf.addPage(p));
  }

  const mergedBytes = await mergedPdf.save();

  const blob = new Blob([mergedBytes], { type: 'application/pdf' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'merged.pdf';
  link.click();
}

async function jpgToPdf() {
  const { PDFDocument } = PDFLib;
  const files = document.getElementById('imageFiles').files;

  if(files.length < 1){
    alert("Select images");
    return;
  }

  const pdfDoc = await PDFDocument.create();

  for (let file of files) {
    const bytes = await file.arrayBuffer();
    let image;

    if (file.type === "image/jpeg") {
      image = await pdfDoc.embedJpg(bytes);
    } else {
      image = await pdfDoc.embedPng(bytes);
    }

    const page = pdfDoc.addPage([image.width, image.height]);
    page.drawImage(image, {
      x: 0,
      y: 0,
      width: image.width,
      height: image.height
    });
  }

  const pdfBytes = await pdfDoc.save();

  const blob = new Blob([pdfBytes], { type: 'application/pdf' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'converted.pdf';
  link.click();
}
  async function splitPDF() {
  const { PDFDocument } = PDFLib;
  const file = document.getElementById('splitFile').files[0];
  const pageNumber = parseInt(document.getElementById('pageNumber').value);

  if (!file || !pageNumber) {
    alert("Select file and enter page number");
    return;
  }

  const bytes = await file.arrayBuffer();
  const pdf = await PDFDocument.load(bytes);

  const totalPages = pdf.getPageCount();

  if (pageNumber < 1 || pageNumber >= totalPages) {
    alert("Invalid page number");
    return;
  }

  // First part
  const pdf1 = await PDFDocument.create();
  const pages1 = await pdf1.copyPages(pdf, [...Array(pageNumber).keys()]);
  pages1.forEach(p => pdf1.addPage(p));
  const pdfBytes1 = await pdf1.save();

  // Second part
  const pdf2 = await PDFDocument.create();
  const pages2 = await pdf2.copyPages(pdf, Array.from({length: totalPages - pageNumber}, (_, i) => i + pageNumber));
  pages2.forEach(p => pdf2.addPage(p));
  const pdfBytes2 = await pdf2.save();

  // Download first file
  const blob1 = new Blob([pdfBytes1], { type: 'application/pdf' });
  const link1 = document.createElement('a');
  link1.href = URL.createObjectURL(blob1);
  link1.download = 'part1.pdf';
  link1.click();

  // Download second file
  const blob2 = new Blob([pdfBytes2], { type: 'application/pdf' });
  const link2 = document.createElement('a');
  link2.href = URL.createObjectURL(blob2);
  link2.download = 'part2.pdf';
  link2.click();
}
  async function editPDF() {

let canvas = document.getElementById('pdfCanvas');
let ctx = canvas.getContext('2d');
let drawing = false;
let eraseMode = false;

document.getElementById('editorFile').addEventListener('change', async function(e) {
  const file = e.target.files[0];
  const fileReader = new FileReader();

  fileReader.onload = async function() {
    const typedarray = new Uint8Array(this.result);

    const pdf = await pdfjsLib.getDocument(typedarray).promise;
    const page = await pdf.getPage(1);

    const viewport = page.getViewport({ scale: 1.5 });
    canvas.height = viewport.height;
    canvas.width = viewport.width;

    const renderContext = {
      canvasContext: ctx,
      viewport: viewport
    };

    await page.render(renderContext).promise;
  };

  fileReader.readAsArrayBuffer(file);
});

// Mouse (PC)
canvas.addEventListener('mousedown', () => drawing = true);
canvas.addEventListener('mouseup', () => {
  drawing = false;
  ctx.beginPath();
});
canvas.addEventListener('mousemove', draw);

// Touch (Mobile)
canvas.addEventListener('touchstart', () => drawing = true);

canvas.addEventListener('touchend', () => {
  drawing = false;
  ctx.beginPath();
});

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault(); // important for smooth drawing

  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];

  const x = touch.clientX - rect.left;
  const y = touch.clientY - rect.top;

  draw({ offsetX: x, offsetY: y });
});

function draw(e) {
  if (!drawing) return;

  ctx.lineWidth = eraseMode ? 20 : 3;
  ctx.strokeStyle = eraseMode ? "#ffffff" : "#ff0000";

  ctx.lineTo(e.offsetX, e.offsetY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(e.offsetX, e.offsetY);
}

function enableDraw() {
  eraseMode = false;
}

function enableErase() {
  eraseMode = true;
}

function downloadEdited() {
  const link = document.createElement('a');
  link.download = 'edited.png';
  link.href = canvas.toDataURL();
  link.click();
  }
  function resizeImage() {
  const file = document.getElementById('resizeImage').files[0];
  const targetKB = document.getElementById('targetSize').value;

  if (!file || !targetKB) {
    alert("Upload image and enter target size");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e) {
    const img = new Image();
    img.src = e.target.result;

    img.onload = function() {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      let width = img.width;
      let height = img.height;

      canvas.width = width;
      canvas.height = height;

      ctx.drawImage(img, 0, 0, width, height);

      let quality = 0.9;

      function compress() {
        const dataUrl = canvas.toDataURL('image/jpeg', quality);
        const sizeKB = Math.round((dataUrl.length * 3) / 4 / 1024);

        if (sizeKB > targetKB && quality > 0.1) {
          quality -= 0.05;
          compress();
        } else {
          const link = document.createElement('a');
          link.href = dataUrl;
          link.download = 'compressed.jpg';
          link.click();
        }
      }

      compress();
    };
  };

  reader.readAsDataURL(file);
  }
  async function compressPDF() {
  const { PDFDocument } = PDFLib;
  const file = document.getElementById('compressPDFFile').files[0];

  if (!file) {
    alert("Upload PDF");
    return;
  }

  const bytes = await file.arrayBuffer();
  const pdfDoc = await PDFDocument.load(bytes);

  const newPdf = await PDFDocument.create();
  const pages = await newPdf.copyPages(pdfDoc, pdfDoc.getPageIndices());

  pages.forEach(page => newPdf.addPage(page));

  const compressedBytes = await newPdf.save({
    useObjectStreams: true
  });

  const blob = new Blob([compressedBytes], { type: 'application/pdf' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'compressed.pdf';
  link.click();
            }
